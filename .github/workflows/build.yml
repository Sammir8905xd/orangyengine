name: OrangyEngine Multi-Platform Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Compilamos en Windows y Linux simultáneamente
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # --- CONFIGURACIÓN PARA LINUX ---
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libglfw3-dev \
          libgles2-mesa-dev \
          libx11-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev \
          libxkbcommon-dev \
          libwayland-dev

    # --- CONFIGURACIÓN PARA WINDOWS ---
    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    # --- COMPILACIÓN COMÚN ---
    - name: Configure CMake
      run: cmake -S . -B build

    - name: Build Engine
      run: cmake --build build --config Release

    # --- PRUEBA DE EJECUCIÓN (SMOKE TEST) ---
    - name: Run Engine Test (Linux)
      if: runner.os == 'Linux'
      run: ./build/OrangyEngine

    - name: Run Engine Test (Windows)
      if: runner.os == 'Windows'
      run: .\build\Release\OrangyEngine.exe
