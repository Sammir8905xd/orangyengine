name: OrangyEngine Multi-Platform Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # --- CONFIGURACIÓN PARA LINUX ---
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libglfw3-dev \
          libgles2-mesa-dev \
          libx11-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev \
          libxkbcommon-dev \
          libwayland-dev

    # --- CONFIGURACIÓN PARA WINDOWS ---
    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Windows Dependencies (PkgConfig)
      if: runner.os == 'Windows'
      run: choco install pkgconfiglite

    # --- COMPILACIÓN ---
    # Usamos -DCMAKE_BUILD_TYPE para asegurar la configuración
    # En Windows, añadimos el flag para ignorar errores de PkgConfig si no es crítico
    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Engine
      run: cmake --build build --config Release

    # --- EMPAQUETADO Y SUBIDA (SOLO WINDOWS) ---
    - name: Prepare Windows Artifacts
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (!(Test-Path ./publish)) { New-Item -ItemType Directory -Path ./publish }
        # Copiamos el ejecutable principal
        if (Test-Path ./build/Release/OrangyEngine.exe) { 
          Copy-Item ./build/Release/OrangyEngine.exe ./publish/ 
        }
        # Buscamos y copiamos cualquier DLL que se haya generado
        Get-ChildItem -Path ./build/Release/ -Filter *.dll -Recurse | Copy-Item -Destination ./publish/
        # Creamos el ZIP con el ejecutable y sus librerías
        Compress-Archive -Path ./publish/* -DestinationPath ./OrangyEngine_Windows.zip -Force

    - name: Upload Artifacts
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: OrangyEngine-Windows-Build
        path: |
          OrangyEngine_Windows.zip
          ./publish/OrangyEngine.exe

    # --- PRUEBA DE EJECUCIÓN ---
    - name: Run Engine Test (Linux)
      if: runner.os == 'Linux'
      run: ./build/OrangyEngine

    - name: Run Engine Test (Windows)
      if: runner.os == 'Windows'
      run: .\build\Release\OrangyEngine.exe
